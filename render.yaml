# Render Blueprint – ArtGallery Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: artgallery-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: AUTH_USERS_JSON
        sync: false                       # set manually in Render dashboard
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ORIGIN
        value: https://favagit.github.io
